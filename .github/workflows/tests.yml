name: Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libglib2.0-0 \
          libsm6 \
          libxext6 \
          libxrender-dev \
          libgomp1
    
    - name: Cache pip dependencies
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        # Use headless OpenCV for CI
        sed 's/opencv-python/opencv-python-headless/g' requirements.txt > requirements_ci.txt
        pip install -r requirements_ci.txt
        pip install pytest pytest-cov
    
    - name: Create required directories
      run: |
        mkdir -p outputs/models
        mkdir -p data/synthetic
        mkdir -p outputs/demo
    
    - name: Run unit tests
      run: |
        PYTHONPATH=. python -m pytest tests/ -v \
          --cov=src \
          --cov-report=term \
          --cov-report=xml \
          --tb=short
    
    - name: Run integration test (synthetic demo)
      run: |
        PYTHONPATH=. python scripts/run_demo.py \
          --mode synthetic \
          --output-dir outputs/demo/ci_test
    
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results-${{ github.sha }}
        path: |
          coverage.xml
          outputs/demo/ci_test/
        retention-days: 30
    
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      if: success()
      with:
        file: ./coverage.xml
        fail_ci_if_error: false

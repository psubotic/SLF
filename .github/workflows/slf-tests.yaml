name: SLF Detector Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy scipy scikit-learn pytest pytest-cov

    - name: Run tests with coverage
      run: |
        PYTHONPATH=. python -m pytest tests/ -v --tb=short \
          --cov=src \
          --cov-report=term-missing \
          --cov-report=xml
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Get Coverage Percentage
      run: |
        coverage report --format=total > coverage_total.txt
        COVERAGE=$(cat coverage_total.txt)
        echo "Coverage: $COVERAGE%"
        echo "COVERAGE=$COVERAGE" >> $GITHUB_ENV

    - name: Create Coverage Badge
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GITHUB_TOKEN }}
        gistID: YOUR_GIST_ID_HERE
        filename: slf-coverage.json
        label: coverage
        message: ${{ env.COVERAGE }}%
        color: brightgreen

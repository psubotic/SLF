name: SLF Detector Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libglib2.0-0

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install opencv-python-headless numpy scipy scikit-learn scikit-image pytest pytest-cov

    - name: Create required directories
      run: |
        mkdir -p outputs/models
        mkdir -p data/synthetic
        mkdir -p outputs/demo

    - name: Run unit tests with coverage
      run: |
        PYTHONPATH=. python -m pytest tests/ -v --tb=short \
          --cov=src \
          --cov-report=term-missing
      env:
        PYTHONPATH: ${{ github.workspace }}

    - name: Run integration demo (synthetic)
      run: |
        PYTHONPATH=. timeout 300 python scripts/run_demo.py \
          --mode synthetic \
          --output-dir outputs/demo/ci_test
      env:
        PYTHONPATH: ${{ github.workspace }}
      continue-on-error: true

    - name: Verify demo output
      run: |
        echo "Checking demo output files..."
        ls -la outputs/demo/ci_test/
        test -f outputs/demo/ci_test/result_synthetic.jpg
        test -f outputs/demo/ci_test/result_synthetic.json
        echo "✓ Demo completed successfully"

    - name: Upload demo artifacts
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: demo-output-${{ github.run_number }}
        path: |
          outputs/demo/ci_test/
        retention-days: 7

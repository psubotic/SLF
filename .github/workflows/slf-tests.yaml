name: SLF Detector Tests

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    
    - name: Install system dependencies for OpenCV
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libgl1-mesa-glx \
          libglib2.0-0 \
          libsm6 \
          libxext6 \
          libxrender-dev \
          libgomp1
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov
    
    - name: Create required directories
      run: |
        mkdir -p outputs/models
        mkdir -p data/synthetic
    
    - name: Run unit tests
      run: |
        PYTHONPATH=. python -m pytest tests/ -v \
          --cov=src \
          --cov-report=term \
          --cov-report=xml \
          --tb=short
    
    - name: Run integration test (synthetic demo)
      run: |
        PYTHONPATH=. python scripts/run_demo.py \
          --mode synthetic \
          --output-dir /tmp/test_output
    
    - name: Run benchmark (quick version)
      run: |
        PYTHONPATH=. timeout 300 python scripts/benchmark_table_metrics.py || true
      continue-on-error: true
    
    - name: Upload test results
      uses: actions/upload-artifact@v3
      if: always()
      with:
        name: test-results
        path: |
          coverage.xml
          /tmp/test_output/
